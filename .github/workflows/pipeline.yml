name: CI/CD Pipeline 

on:
  push:
    branches: ["main"]         # Run when you push code to main
  pull_request:
    branches: ["main"]         # Run when you open a pull request into main

# Variables available to every job below
env:
  REGISTRY: ghcr.io                        # GitHub container registry 
  IMAGE_NAME: ${{ github.repository }}     

jobs:
  # 1.) Lint
  # Checks code style and syntax before anything else.
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest      # GitHub spins up a fresh Linux machine for this
    steps:
      - uses: actions/checkout@v4       # Downloads your code onto that machine
      - uses: actions/setup-python@v5   
        with:
          python-version: "3.12"
          cache: pip                    # Cache pip packages so future runs are faster

      - run: pip install flake8                          
      - run: flake8 app.py tests/ --max-line-length=100  

  # 2.) Tests
  # Runs pytest tests. Only starts if lint passed.
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint                 # don't start until lint finishes AND passes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt -r requirements-dev.txt  
      - run: pytest tests/ -v                                          # Runs all tests

  # 3.) Static Analysis (CodeQL) 
  # GitHub's security scanner reads code looking for any vulnerabilities.
  # Runs in parallel with steps 4 & 5 as soon as lint passes.
  codeql:
    name: Static Analysis (CodeQL)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      security-events: write    # Allows CodeQL to post findings to the Security tab
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python             # Tells CodeQL this is a Python project
          queries: security-extended    # Uses the deeper security ruleset

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3   # Builds the code so CodeQL can analyze it

      - name: Analyze
        uses: github/codeql-action/analyze@v3     

  # 4.) Secret Scanning (Gitleaks)
  # Scans every commit in git history for any hard coded passwords or API keys.
  # Runs in parallel with steps 3 & 5.
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Download full git history, not just latest commit

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # Auto-provided by GitHub, don't touch

  # 5.) Dependency Audit (pip-audit) 
  # Checks your requirements.txt packages against a database of known vulnerabilities.
  # Runs in parallel with steps 3 and 4.
  dep-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install pip-audit              # Installs the auditing tool
      - run: pip-audit -r requirements.txt      # Checks only production dependencies

  # 6. Build & Scan Container (Docker + Trivy)
  # Waits for ALL of steps 2-5 to pass, then builds the Docker container and scans it for vulnerabilities inside the packaged image.
  build-and-scan:
    name: Build & Scan Container (Trivy)
    runs-on: ubuntu-latest
    needs: [test, codeql, secret-scan, dep-audit]   # All four must pass before this runs
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build image (local tag for scanning)
        run: docker build -t worldcup-stats:${{ github.sha }} .
        

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worldcup-stats:${{ github.sha }}   # Scan the image we just built
          format: sarif                                  # Output format for GitHub Security tab
          output: trivy-results.sarif
          severity: CRITICAL,HIGH                        # Only fail on serious vulnerabilities
          exit-code: "1"                                 # Exit with error if any are found (blocks deploy)

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()          # Run this even if Trivy found something (so we can see the report)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # 7.) Deploy
  # Only runs on pushes to main (not pull requests).
  # Publishes the verified container image to GitHub Container Registry.
  deploy:
    name: Deploy (Push to GHCR)
    runs-on: ubuntu-latest
    needs: build-and-scan       # Only runs if the container scan passed
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write           # Allows pushing to GitHub Container Registry
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}                  
          username: ${{ github.actor }}                 
          password: ${{ secrets.GITHUB_TOKEN }}          

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-    # Tag with commit hash e.g. sha-abc1234 (unique per push)
            type=raw,value=latest   # Also tag as "latest" (always points to newest build)

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .                              # Build from current directory
          push: true                              # Actually push to registry (not just build)
          tags: ${{ steps.meta.outputs.tags }}    # Use the tags from the step above
          labels: ${{ steps.meta.outputs.labels }}
